<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>색깔 감지기</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --surface: #ffffff;
    --surface2: #faf7f4;
    --border: rgba(0,0,0,0.08);
    --text: #1a1a1a;
    --muted: #999;
    --accent: #ff6b35;
    --accent2: #ffd166;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  .header {
    width: 100%;
    max-width: 420px;
    padding: 24px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left h1 {
    font-family: 'Nunito', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }
  .header-left p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 300;
  }
  .header-badge {
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    font-family: 'Nunito', sans-serif;
    letter-spacing: 0.5px;
  }

  .stage {
    width: min(100vw, 420px);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .camera-card {
    background: var(--surface);
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .camera-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #e8e0d8;
    overflow: hidden;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .reticle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 5;
  }
  .reticle-outer {
    width: 60px;
    height: 60px;
    border: 2px solid rgba(255,107,53,0.8);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  .reticle-inner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    border: 1.5px solid rgba(255,107,53,0.6);
    border-radius: 50%;
  }
  .reticle-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 5px;
    height: 5px;
    background: var(--accent);
    border-radius: 50%;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.08); opacity: 0.5; }
  }

  .corner {
    position: absolute;
    width: 18px;
    height: 18px;
    z-index: 10;
    pointer-events: none;
  }
  .corner-tl { top: 14px; left: 14px; border-top: 2.5px solid var(--accent); border-left: 2.5px solid var(--accent); border-radius: 4px 0 0 0; }
  .corner-tr { top: 14px; right: 14px; border-top: 2.5px solid var(--accent); border-right: 2.5px solid var(--accent); border-radius: 0 4px 0 0; }
  .corner-bl { bottom: 14px; left: 14px; border-bottom: 2.5px solid var(--accent); border-left: 2.5px solid var(--accent); border-radius: 0 0 0 4px; }
  .corner-br { bottom: 14px; right: 14px; border-bottom: 2.5px solid var(--accent); border-right: 2.5px solid var(--accent); border-radius: 0 0 4px 0; }

  .overlay-start {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(245,240,235,0.92);
    cursor: pointer;
    z-index: 20;
    gap: 14px;
    transition: opacity 0.3s;
  }
  .start-icon {
    width: 64px;
    height: 64px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .overlay-start p {
    font-size: 14px;
    color: var(--muted);
    font-weight: 500;
  }

  .color-result {
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .color-swatch {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    background: #e8e0d8;
    border: 1px solid var(--border);
    transition: background-color 0.4s ease;
    flex-shrink: 0;
  }
  .color-text { flex: 1; }
  .color-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .color-name-kr {
    font-family: 'Nunito', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    transition: color 0.3s;
  }
  .color-hex {
    font-size: 12px;
    color: var(--muted);
    font-family: monospace;
    margin-top: 5px;
  }

  .info-card {
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .rgb-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .rgb-title {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-label {
    font-size: 12px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    width: 14px;
  }
  .bar-label.r { color: #e74c4c; }
  .bar-label.g { color: #27ae60; }
  .bar-label.b { color: #2980b9; }
  .bar-track {
    flex: 1;
    height: 6px;
    background: #f0ebe4;
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .fill-r { background: #e74c4c; }
  .fill-g { background: #27ae60; }
  .fill-b { background: #2980b9; }
  .bar-val {
    font-size: 11px;
    color: var(--muted);
    font-family: monospace;
    width: 28px;
    text-align: right;
  }

  .bottom-row {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .status-row {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ddd;
  }
  .status-dot.active {
    background: #2ecc71;
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .status-text {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }
  .btn-sound {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #f5f0eb;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.2s;
  }
  .btn-sound:hover { background: #ede8e2; color: var(--text); }
  .btn-sound.on { background: #fff3ee; border-color: #ffcfbc; color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Color Scan</h1>
    <p>색깔 감지 카메라</p>
  </div>
  <div class="header-badge">LIVE</div>
</div>

<div class="stage">
  <div class="camera-card">
    <div class="camera-frame" id="cameraFrame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <video id="webcam" autoplay playsinline muted></video>
      <div class="reticle">
        <div class="reticle-outer"></div>
        <div class="reticle-inner"></div>
        <div class="reticle-dot"></div>
      </div>
      <div class="overlay-start" id="overlayStart">
        <div class="start-icon">📷</div>
        <p>탭하여 카메라 시작</p>
      </div>
    </div>
    <div class="color-result">
      <div class="color-swatch" id="colorSwatch"></div>
      <div class="color-text">
        <div class="color-label">감지된 색상</div>
        <div class="color-name-kr" id="colorName">—</div>
        <div class="color-hex" id="colorHex">#——————</div>
      </div>
    </div>
  </div>

  <div class="info-card">
    <div class="rgb-section">
      <div class="rgb-title">RGB 값</div>
      <div class="bar-row">
        <span class="bar-label r">R</span>
        <div class="bar-track"><div class="bar-fill fill-r" id="barR"></div></div>
        <span class="bar-val" id="valR">—</span>
      </div>
      <div class="bar-row">
        <span class="bar-label g">G</span>
        <div class="bar-track"><div class="bar-fill fill-g" id="barG"></div></div>
        <span class="bar-val" id="valG">—</span>
      </div>
      <div class="bar-row">
        <span class="bar-label b">B</span>
        <div class="bar-track"><div class="bar-fill fill-b" id="barB"></div></div>
        <span class="bar-val" id="valB">—</span>
      </div>
    </div>
    <div class="bottom-row">
      <div class="status-row">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">대기 중</span>
      </div>
      <button class="btn-sound" id="btnSound" onclick="toggleSound()">
        <span id="soundIcon">🔇</span>
        <span id="soundLabel">음성 끄기</span>
      </button>
    </div>
  </div>
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const overlayStart = document.getElementById('overlayStart');

let isRunning = false;
let soundOn = true;
let prevColorName = '';

overlayStart.addEventListener('click', startCamera);

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } }
    });
    video.srcObject = stream;
    video.addEventListener('loadeddata', () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      overlayStart.style.opacity = '0';
      setTimeout(() => overlayStart.style.display = 'none', 300);
      document.getElementById('statusDot').classList.add('active');
      document.getElementById('statusText').textContent = '감지 중';
      isRunning = true;
      setInterval(analyzeColor, 800);
    });
  } catch(e) {
    document.getElementById('statusText').textContent = '카메라 권한 필요';
    alert('카메라 접근 권한이 필요합니다.');
  }
}

function analyzeColor() {
  if (!isRunning) return;
  const cx = Math.floor(canvas.width / 2);
  const cy = Math.floor(canvas.height / 2);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  let rSum = 0, gSum = 0, bSum = 0, count = 0;
  const sample = 8;
  for (let dx = -sample; dx <= sample; dx += 4) {
    for (let dy = -sample; dy <= sample; dy += 4) {
      const px = ctx.getImageData(cx + dx, cy + dy, 1, 1).data;
      rSum += px[0]; gSum += px[1]; bSum += px[2]; count++;
    }
  }
  const r = Math.round(rSum / count);
  const g = Math.round(gSum / count);
  const b = Math.round(bSum / count);
  updateUI(r, g, b);
}

function updateUI(r, g, b) {
  const hex = '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('').toUpperCase();
  const name = getColorName(r, g, b);

  document.getElementById('colorSwatch').style.backgroundColor = `rgb(${r},${g},${b})`;
  document.getElementById('colorName').textContent = name;
  document.getElementById('colorHex').textContent = hex;
  document.getElementById('barR').style.width = (r/255*100) + '%';
  document.getElementById('barG').style.width = (g/255*100) + '%';
  document.getElementById('barB').style.width = (b/255*100) + '%';
  document.getElementById('valR').textContent = r;
  document.getElementById('valG').textContent = g;
  document.getElementById('valB').textContent = b;

  if (soundOn && name !== prevColorName && name !== '알수없음') {
    speak(name);
    prevColorName = name;
  }
}

function getColorName(r, g, b) {
  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  const delta = max - min;
  const brightness = (r * 299 + g * 587 + b * 114) / 1000;
  const saturation = max === 0 ? 0 : delta / max;

  if (brightness < 40) return '검정';
  if (brightness > 220 && saturation < 0.15) return '흰색';
  if (saturation < 0.15) {
    if (brightness < 85) return '진회색';
    if (brightness < 160) return '회색';
    return '밝은회색';
  }

  let hue = 0;
  if (max === r) hue = ((g - b) / delta) % 6;
  else if (max === g) hue = (b - r) / delta + 2;
  else hue = (r - g) / delta + 4;
  hue = Math.round(hue * 60);
  if (hue < 0) hue += 360;

  if (hue < 15 || hue >= 345) return '빨간색';
  if (hue < 40) return '주황색';
  if (hue < 70) return '노란색';
  if (hue < 80) return '연두색';
  if (hue < 160) return '초록색';
  if (hue < 195) return '청록색';
  if (hue < 255) return '파란색';
  if (hue < 285) return '남색';
  if (hue < 320) return '보라색';
  if (hue < 345) return '분홍색';
  return '알수없음';
}

function speak(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  u.rate = 0.95;
  window.speechSynthesis.speak(u);
}

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('soundLabel').textContent = soundOn ? '음성 켜짐' : '음성 끄기';
  document.getElementById('btnSound').classList.toggle('on', soundOn);
}
</script>
</body>
</html>
